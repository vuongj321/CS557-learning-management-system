<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Student Signup</title>
  </head>
  <body>
    <h1>Student Signup</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Sign up as Student</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
  </body>
</html>
