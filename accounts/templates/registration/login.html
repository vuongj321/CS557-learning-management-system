<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Login</title>
  </head>
  <body>
    <h1>Login</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Login</button>
    </form>
    <p>Sign up as <a href="{% url 'signup-student' %}">Student</a> or <a href="{% url 'signup-teacher' %}">Teacher</a>.</p>
  </body>
</html>
