{% extends 'layout.html' %}

{% block title %}
  <title>Courses - Learning Management System</title>
{% endblock %}

{% block content %}
  <div class="d-flex">
    <h1 class="flex-grow-1">My Courses</h1>
    <div class="dropdown">
      <button class="btn btn-primary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">Actions</button>
      <ul class="dropdown-menu">
        {% if user.is_instructor %}
          <li>
            <a class="dropdown-item" href="{% url 'create_course' %}">Create Course</a>
          </li>
        {% endif %}
        {% if user.is_student %}
          <li>
            <a class="dropdown-item" href="{% url 'enroll_course' %}">Enroll in Course</a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
  
{% endblock %}
